<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>
    <style>
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #00bfff;
            margin-top: 50px;
        }

        .search-box {
            width: 500px;
            margin: 50px auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,191,255,0.2);
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            background: #00bfff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0099cc;
        }

        footer {
            margin-top: 50px;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Phishing URL Detection</h2>

    <div class="search-box">
        <form method="POST" action="/predict">
            <h3>Paste URL to Scan</h3>

            <input
                type="text"
                name="url"
                placeholder="https://example.com"
                required
            >

            <br>

            <button type="submit">
                Scan Website
            </button>
        </form>
    </div>

    <footer>&copy; sekhar</footer>

</body>
</html>
